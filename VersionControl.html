<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git Command Reference</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e2a;
      --border: #252936;
      --accent: #f0541e;
      --accent2: #ffa040;
      --green: #3efac8;
      --blue: #5e9cff;
      --purple: #b97bff;
      --text: #e8eaf2;
      --muted: #7a7f96;
      --dim: #4a4f66;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(94, 156, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(94, 156, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 80%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(240, 84, 30, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px 100px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 64px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 24px;
    }

    .header-left { max-width: 600px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(240, 84, 30, 0.12);
      border: 1px solid rgba(240, 84, 30, 0.3);
      color: var(--accent2);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      padding: 6px 14px;
      border-radius: 4px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, var(--muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.6;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      align-self: flex-end;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 20px;
      text-align: center;
    }

    .stat:first-child { border-radius: 8px 0 0 8px; }
    .stat:last-child { border-radius: 0 8px 8px 0; }

    .stat-num {
      font-size: 24px;
      font-weight: 800;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 40px;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 16px 18px 16px 48px;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="search"]:focus { border-color: var(--accent); }
    input[type="search"]::placeholder { color: var(--dim); }

    /* Section headers */
    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 12px;
      margin-top: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Command cards */
    .commands-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cmd-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0;
      overflow: hidden;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      animation: slideIn 0.4s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cmd-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
      box-shadow: -4px 0 0 var(--accent), 0 8px 32px rgba(0,0,0,0.3);
    }

    .cmd-card.active {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .cmd-main {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
    }

    .cmd-index {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--dim);
      width: 24px;
      text-align: right;
      flex-shrink: 0;
    }

    .cmd-category-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cmd-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
      background: rgba(62, 250, 200, 0.08);
      border: 1px solid rgba(62, 250, 200, 0.15);
      padding: 6px 14px;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .cmd-desc {
      color: var(--text);
      font-size: 14px;
      font-weight: 400;
      flex: 1;
      line-height: 1.4;
    }

    .cmd-desc em {
      color: var(--accent2);
      font-style: normal;
      font-weight: 600;
    }

    .cmd-arrow {
      color: var(--dim);
      font-size: 18px;
      transition: transform 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .cmd-card.active .cmd-arrow {
      transform: rotate(90deg);
      color: var(--accent);
    }

    /* Expanded detail */
    .cmd-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .cmd-card.active .cmd-detail { max-height: 400px; }

    .cmd-detail-inner {
      border-top: 1px solid var(--border);
      padding: 20px 20px 20px 68px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .cmd-detail-inner { grid-template-columns: 1fr; padding-left: 20px; }
    }

    .detail-block { display: flex; flex-direction: column; gap: 6px; }

    .detail-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--dim);
    }

    .detail-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .detail-full {
      grid-column: 1 / -1;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(240, 84, 30, 0.1);
      border: 1px solid rgba(240, 84, 30, 0.25);
      color: var(--accent2);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .copy-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .copy-btn.copied {
      background: rgba(62, 250, 200, 0.1);
      border-color: rgba(62, 250, 200, 0.3);
      color: var(--green);
    }

    /* Category colors */
    .cat-setup { background: var(--blue); }
    .cat-staging { background: var(--green); }
    .cat-remote { background: var(--accent); }
    .cat-history { background: var(--purple); }
    .cat-branch { background: var(--accent2); }

    /* Footer */
    footer {
      margin-top: 80px;
      border-top: 1px solid var(--border);
      padding-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--dim);
    }

    .footer-text span { color: var(--accent); }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      display: none;
    }

    .no-results .nr-icon { font-size: 40px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <div class="badge">📁 Version Control</div>
      <h1>Git Commands</h1>
      <p class="subtitle">// Complete reference for everyday Git workflows</p>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="totalCount">20</div>
        <div class="stat-label">Commands</div>
      </div>
      <div class="stat">
        <div class="stat-num">5</div>
        <div class="stat-label">Categories</div>
      </div>
      <div class="stat">
        <div class="stat-num">∞</div>
        <div class="stat-label">Projects</div>
      </div>
    </div>
  </header>

  <div class="search-wrap">
    <span class="search-icon">$_</span>
    <input type="search" id="searchInput" placeholder="Search commands or descriptions..." autocomplete="off">
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All Commands</button>
    <button class="filter-btn" data-filter="setup">Setup</button>
    <button class="filter-btn" data-filter="staging">Staging & Commit</button>
    <button class="filter-btn" data-filter="remote">Remote</button>
    <button class="filter-btn" data-filter="history">History & Reset</button>
    <button class="filter-btn" data-filter="branch">Branching</button>
  </div>

  <div class="commands-grid" id="commandsGrid"></div>
  <div class="no-results" id="noResults">
    <div class="nr-icon">🔍</div>
    No commands match your search.
  </div>

  <footer>
    <div class="footer-text">Git Command Reference · <span>20 commands</span> across 5 categories</div>
    <div class="footer-text">Click any card to expand details →</div>
  </footer>

</div>

<script>
const commands = [
  // SETUP
  {
    cat: "setup", catLabel: "Setup",
    cmd: "git init",
    desc: "Initialize a new Git repository in the current project folder",
    usage: "git init",
    example: "cd my-project && git init",
    notes: "Creates a hidden .git directory to track version history",
    flag: null
  },
  {
    cat: "setup", catLabel: "Setup",
    cmd: "git config --global user.name",
    desc: 'Set your global username displayed on all commits',
    usage: 'git config --global user.name "Your Name"',
    example: 'git config --global user.name "Rajesh Sharma"',
    notes: "Required one-time setup before your first commit",
    flag: null
  },
  {
    cat: "setup", catLabel: "Setup",
    cmd: "git config --global user.email",
    desc: "Set your global email linked to all commits",
    usage: 'git config --global user.email "you@example.com"',
    example: 'git config --global user.email "raj@email.com"',
    notes: "Should match your GitHub account email",
    flag: null
  },
  {
    cat: "setup", catLabel: "Setup",
    cmd: "git clone",
    desc: "Clone an existing remote repository to your local machine",
    usage: "git clone <url>",
    example: "git clone https://github.com/user/repo.git",
    notes: "Automatically sets up remote tracking as 'origin'",
    flag: null
  },

  // STAGING & COMMIT
  {
    cat: "staging", catLabel: "Staging & Commit",
    cmd: "git add .",
    desc: "Stage all modified and new files for the next commit",
    usage: "git add .",
    example: "git add .",
    notes: "Use 'git add <file>' to stage a specific file only",
    flag: null
  },
  {
    cat: "staging", catLabel: "Staging & Commit",
    cmd: "git add <file>",
    desc: "Stage a specific file for the next commit",
    usage: "git add <filename>",
    example: "git add src/Login.java",
    notes: "Gives you granular control over what goes into a commit",
    flag: null
  },
  {
    cat: "staging", catLabel: "Staging & Commit",
    cmd: "git status",
    desc: "Show which files are staged, unstaged, or untracked",
    usage: "git status",
    example: "git status",
    notes: "Use often — it's your real-time view of the working tree",
    flag: null
  },
  {
    cat: "staging", catLabel: "Staging & Commit",
    cmd: "git commit -m 'message'",
    desc: "Commit staged changes with a descriptive message",
    usage: "git commit -m 'your message'",
    example: "git commit -m 'feat: add login page'",
    notes: "Follow conventional commit format for clean history",
    flag: null
  },
  {
    cat: "staging", catLabel: "Staging & Commit",
    cmd: "git diff",
    desc: "Show unstaged changes between your working tree and last commit",
    usage: "git diff",
    example: "git diff src/App.java",
    notes: "Use 'git diff --staged' to see staged changes",
    flag: null
  },
  {
    cat: "staging", catLabel: "Staging & Commit",
    cmd: "git stash",
    desc: "Temporarily save uncommitted changes without committing them",
    usage: "git stash / git stash pop",
    example: "git stash && git checkout main && git stash pop",
    notes: "Useful when you need to quickly switch branches mid-work",
    flag: null
  },

  // REMOTE
  {
    cat: "remote", catLabel: "Remote",
    cmd: "git remote add origin",
    desc: "Link your local repository to a remote GitHub repository",
    usage: "git remote add origin <url>",
    example: "git remote add origin https://github.com/rshar29/Gitpractice.git",
    notes: "Run only once per project after git init",
    flag: null
  },
  {
    cat: "remote", catLabel: "Remote",
    cmd: "git branch -M main",
    desc: "Rename the current branch to 'main' (modern default)",
    usage: "git branch -M main",
    example: "git branch -M main",
    notes: "GitHub now uses 'main' instead of 'master' by default",
    flag: null
  },
  {
    cat: "remote", catLabel: "Remote",
    cmd: "git push -u origin main",
    desc: "Push local commits to the remote main branch and set upstream tracking",
    usage: "git push -u origin <branch>",
    example: "git push -u origin main",
    notes: "After -u is set, you can just run 'git push' going forward",
    flag: null
  },
  {
    cat: "remote", catLabel: "Remote",
    cmd: "git pull",
    desc: "Fetch and merge changes from the remote branch into your local branch",
    usage: "git pull origin <branch>",
    example: "git pull origin main",
    notes: "Always pull before starting new work to stay in sync",
    flag: null
  },
  {
    cat: "remote", catLabel: "Remote",
    cmd: "git fetch",
    desc: "Download remote changes without merging them into your local branch",
    usage: "git fetch origin",
    example: "git fetch origin",
    notes: "Safe way to see what others have pushed before merging",
    flag: null
  },

  // HISTORY & RESET
  {
    cat: "history", catLabel: "History & Reset",
    cmd: "git log",
    desc: "View the full commit history of the current branch",
    usage: "git log --oneline",
    example: "git log --oneline --graph --all",
    notes: "Use --oneline for a compact, readable view of history",
    flag: null
  },
  {
    cat: "history", catLabel: "History & Reset",
    cmd: "git reset --hard <hash>",
    desc: "Revert to a specific commit — all changes after it are permanently deleted",
    usage: "git reset --hard <commit-hash>",
    example: "git reset --hard f7a7bbc7aa8ac8a511950fa5d1fd5cd333eab0ad",
    notes: "⚠️ Destructive! Lost code cannot be recovered easily. Use with caution.",
    flag: "danger"
  },
  {
    cat: "history", catLabel: "History & Reset",
    cmd: "git reset --soft <hash>",
    desc: "Move HEAD to a past commit but keep all changes staged — code is safe",
    usage: "git reset --soft <commit-hash>",
    example: "git reset --soft f7a7bbc7aa8ac8a511950fa5d1fd5cd333eab0ad",
    notes: "Great for undoing commits while preserving your work",
    flag: null
  },

  // BRANCHING
  {
    cat: "branch", catLabel: "Branching",
    cmd: "git branch",
    desc: "List all local branches and highlight the currently active one",
    usage: "git branch",
    example: "git branch -a  # shows remote branches too",
    notes: "The branch with * is your current working branch",
    flag: null
  },
  {
    cat: "branch", catLabel: "Branching",
    cmd: "git branch <name>",
    desc: "Create a new branch without switching to it",
    usage: "git branch <branch-name>",
    example: "git branch feature/login",
    notes: "Use 'git checkout -b <name>' to create and switch in one step",
    flag: null
  },
  {
    cat: "branch", catLabel: "Branching",
    cmd: "git checkout <branch>",
    desc: "Switch to an existing branch",
    usage: "git checkout <branch-name>",
    example: "git checkout test",
    notes: "Modern alternative: 'git switch <branch-name>'",
    flag: null
  },
  {
    cat: "branch", catLabel: "Branching",
    cmd: "git checkout -b <branch>",
    desc: "Create a new branch and switch to it immediately",
    usage: "git checkout -b <branch-name>",
    example: "git checkout -b feature/payment",
    notes: "Shortcut for 'git branch + git checkout' in one command",
    flag: null
  },
  {
    cat: "branch", catLabel: "Branching",
    cmd: "git merge <branch>",
    desc: "Merge the specified branch into your currently active branch",
    usage: "git merge <branch-name>",
    example: "git merge main",
    notes: "Switch to target branch first, then run merge from source",
    flag: null
  },
  {
    cat: "branch", catLabel: "Branching",
    cmd: "git branch -d <branch>",
    desc: "Delete a branch that has already been merged",
    usage: "git branch -d <branch-name>",
    example: "git branch -d feature/login",
    notes: "Use -D (capital) to force-delete an unmerged branch",
    flag: null
  }
];

const catColors = {
  setup: "cat-setup",
  staging: "cat-staging",
  remote: "cat-remote",
  history: "cat-history",
  branch: "cat-branch"
};

const catDot = {
  setup: "#5e9cff",
  staging: "#3efac8",
  remote: "#f0541e",
  history: "#b97bff",
  branch: "#ffa040"
};

let activeFilter = "all";
let activeCard = null;

function renderCommands(list) {
  const grid = document.getElementById("commandsGrid");
  const noResults = document.getElementById("noResults");
  grid.innerHTML = "";

  if (list.length === 0) {
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  // Group by category
  const sections = {};
  list.forEach(c => {
    if (!sections[c.catLabel]) sections[c.catLabel] = [];
    sections[c.catLabel].push(c);
  });

  let globalIdx = 1;
  Object.entries(sections).forEach(([label, cmds]) => {
    const secLabel = document.createElement("div");
    secLabel.className = "section-label";
    secLabel.textContent = label;
    grid.appendChild(secLabel);

    cmds.forEach(cmd => {
      const card = document.createElement("div");
      card.className = "cmd-card";
      card.setAttribute("data-cat", cmd.cat);
      card.style.animationDelay = (globalIdx * 0.04) + "s";

      const dangerStyle = cmd.flag === "danger"
        ? `border-color: rgba(255, 80, 80, 0.3); background: rgba(255, 60, 60, 0.04);`
        : "";

      card.style.cssText += dangerStyle;

      card.innerHTML = `
        <div class="cmd-main">
          <span class="cmd-index">${String(globalIdx).padStart(2, "0")}</span>
          <span class="cmd-category-dot" style="background:${catDot[cmd.cat]}"></span>
          <span class="cmd-code">${escapeHtml(cmd.cmd)}</span>
          <span class="cmd-desc">${escapeHtml(cmd.desc).replace(/⚠️/g, "<em>⚠️</em>")}</span>
          <span class="cmd-arrow">›</span>
        </div>
        <div class="cmd-detail">
          <div class="cmd-detail-inner">
            <div class="detail-block">
              <div class="detail-label">Syntax</div>
              <div class="detail-value">${escapeHtml(cmd.usage)}</div>
            </div>
            <div class="detail-block">
              <div class="detail-label">Example</div>
              <div class="detail-value">${escapeHtml(cmd.example)}</div>
            </div>
            <div class="detail-block detail-full">
              <div class="detail-label">💡 Note</div>
              <div class="detail-value">${escapeHtml(cmd.notes)}</div>
            </div>
            <div class="detail-block">
              <button class="copy-btn" data-cmd="${escapeHtml(cmd.usage)}">⎘ Copy command</button>
            </div>
          </div>
        </div>
      `;

      card.addEventListener("click", (e) => {
        if (e.target.closest(".copy-btn")) return;
        if (activeCard && activeCard !== card) activeCard.classList.remove("active");
        card.classList.toggle("active");
        activeCard = card.classList.contains("active") ? card : null;
      });

      grid.appendChild(card);
      globalIdx++;
    });
  });

  // Copy buttons
  grid.querySelectorAll(".copy-btn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      const text = btn.getAttribute("data-cmd");
      try {
        await navigator.clipboard.writeText(text);
        btn.classList.add("copied");
        btn.textContent = "✓ Copied!";
        setTimeout(() => {
          btn.classList.remove("copied");
          btn.textContent = "⎘ Copy command";
        }, 1800);
      } catch {}
    });
  });

  document.getElementById("totalCount").textContent = commands.length;
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function filterAndRender() {
  const query = document.getElementById("searchInput").value.toLowerCase().trim();
  let list = commands;

  if (activeFilter !== "all") list = list.filter(c => c.cat === activeFilter);
  if (query) list = list.filter(c =>
    c.cmd.toLowerCase().includes(query) ||
    c.desc.toLowerCase().includes(query) ||
    c.notes.toLowerCase().includes(query)
  );

  renderCommands(list);
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.getAttribute("data-filter");
    filterAndRender();
  });
});

document.getElementById("searchInput").addEventListener("input", filterAndRender);

renderCommands(commands);
</script>
</body>
</html>
